<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yandex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="images/menu.png">
    </header>

    <main>
        <h1 class="logo">Yandex</h1>
        <ul>
            <li class="image"><img src="images/gallery.png"><span>Images</span></li>
            <li class="image"><img src="images/video.png"><span>Videos</span></li>
            <li class="image"><img src="images/placeholder.png"><span>Maps</span></li>
            <li class="image"><img src="images/translate.png"><span>Translate</span></li>
            <li class="image"><img src="images/cloudy.png"><span>Weather</span></li>
            <li class="image"><img src="images/apps.png" height="30%" width="500px"><span>Apps</span></li>
        </ul>

        <section class="textbox">
            <input type="text" placeholder="Search with Yandex AI">
            <img class="img" src="images/keyboard-regular.png">
            <img class="img" src="images/camera-regular.png">
        </section>
    </main>
</body>
</html>
